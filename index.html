<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Erik's TDL Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .last-updated {
            color: #718096;
            font-size: 0.9em;
        }

        .refresh-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9em;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .refresh-button:hover {
            transform: scale(1.05);
        }

        .refresh-button:active {
            transform: scale(0.95);
        }

        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .section h2 {
            color: #2d3748;
            font-size: 1.5em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .section h3 {
            color: #4a5568;
            font-size: 1.2em;
            margin: 20px 0 10px 0;
        }

        .task-item {
            padding: 12px 15px;
            margin: 8px 0;
            background: #f7fafc;
            border-left: 4px solid #4299e1;
            border-radius: 5px;
            transition: all 0.2s;
        }

        .task-item:hover {
            background: #edf2f7;
            transform: translateX(5px);
        }

        .task-item.overdue {
            border-left-color: #f56565;
            background: #fff5f5;
        }

        .task-item.today {
            border-left-color: #ed8936;
            background: #fffaf0;
        }

        .task-item.completed {
            border-left-color: #48bb78;
            background: #f0fff4;
            opacity: 0.7;
        }

        .task-item.completed::before {
            content: "✓ ";
            color: #48bb78;
            font-weight: bold;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            display: block;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .section {
                padding: 15px;
            }

            .stat-card {
                min-width: 120px;
            }
        }
    </style>
</head>
<body>

        function parseTDL(text) {
            const lines = text.split('\n');
            const sections = {
                today: [],
                tomorrow: [],
                overdue: [],
                thisWeek: [],
                thisMonth: [],
                future: [],
                recurring: [],
                completed: []
            };

            let currentSection = null;
            let totalTasks = 0;
            let completedCount = 0;

            for (let line of lines) {
                // Detect sections
                if (line.includes('### Today')) currentSection = 'today';
                else if (line.includes('### Tomorrow')) currentSection = 'tomorrow';
                else if (line.includes('### Overdue')) currentSection = 'overdue';
                else if (line.includes('## This Week')) currentSection = 'thisWeek';
                else if (line.includes('## This Month')) currentSection = 'thisMonth';
                else if (line.includes('## Future')) currentSection = 'future';
                else if (line.includes('## Recurring')) currentSection = 'recurring';
                else if (line.includes('## Completed')) currentSection = 'completed';
                else if (line.includes('## Family Board') || line.includes('## Home Projects')) currentSection = null;

                // Parse task items
                if (currentSection && (line.trim().startsWith('- [ ]') || line.trim().startsWith('- [x]'))) {
                    const isCompleted = line.includes('[x]');
                    const task = line.replace(/^- \[(x| )\] /, '').trim();

                    if (task) {
                        sections[currentSection].push({ task, completed: isCompleted });
                        totalTasks++;
                        if (isCompleted) completedCount++;
                    }
                }
            }

            renderTDL(sections, totalTasks, completedCount);
        }

        function renderTDL(sections, totalTasks, completedCount) {
            const today = new Date().toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            let html = `
                <div class="section">
                    <h2>📊 Overview</h2>
                    <div class="stats">
                        <div class="stat-card">
                            <span class="stat-number">${sections.overdue.length}</span>
                            <span class="stat-label">Overdue</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${sections.today.length}</span>
                            <span class="stat-label">Due Today</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${sections.tomorrow.length}</span>
                            <span class="stat-label">Tomorrow</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number">${completedCount}</span>
                            <span class="stat-label">Completed</span>
                        </div>
                    </div>
                </div>
            `;

            // Overdue
            if (sections.overdue.length > 0) {
                html += `<div class="section">
                    <h2>🚨 Overdue</h2>`;
                sections.overdue.forEach(item => {
                    html += `<div class="task-item overdue">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // Today
            if (sections.today.length > 0) {
                html += `<div class="section">
                    <h2>📅 Today - ${today}</h2>`;
                sections.today.forEach(item => {
                    const className = item.completed ? 'task-item completed' : 'task-item today';
                    html += `<div class="${className}">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // Tomorrow
            if (sections.tomorrow.length > 0) {
                html += `<div class="section">
                    <h2>➡️ Tomorrow</h2>`;
                sections.tomorrow.forEach(item => {
                    html += `<div class="task-item">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // This Week
            if (sections.thisWeek.length > 0) {
                html += `<div class="section">
                    <h2>📆 This Week</h2>`;
                sections.thisWeek.forEach(item => {
                    html += `<div class="task-item">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // This Month
            if (sections.thisMonth.length > 0) {
                html += `<div class="section">
                    <h2>🗓️ This Month</h2>`;
                sections.thisMonth.forEach(item => {
                    html += `<div class="task-item">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // Recurring
            if (sections.recurring.length > 0) {
                html += `<div class="section">
                    <h2>🔄 Recurring Tasks</h2>`;
                sections.recurring.forEach(item => {
                    html += `<div class="task-item">${item.task}</div>`;
                });
                html += `</div>`;
            }

            // Completed Today
            if (sections.completed.length > 0) {
                html += `<div class="section">
                    <h2>✅ Completed Today</h2>`;
                sections.completed.forEach(item => {
                    html += `<div class="task-item completed">${item.task}</div>`;
                });
                html += `</div>`;
            }

            document.getElementById('content').innerHTML = html;
        }

        function updateLastUpdated() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true
            });
            const dateString = now.toLocaleDateString('en-US', {
                weekday: 'long',
                month: 'short',
                day: 'numeric'
            });
            document.getElementById('lastUpdated').textContent = `Last updated: ${dateString} at ${timeString}`;
        }

        function loadTDL() {
            parseTDL(TDL_DATA);
            updateLastUpdated();
        }

        // Initial load
        loadTDL();
    </script>
